name: CI + Docker

on:
  push:
    branches: [ "develop" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest ./frontend

      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest ./backend

      - name: Push backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest